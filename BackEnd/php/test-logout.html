<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Logout API</title>
</head>
<body>
    <h2>Test Logout API</h2>

    <p>
        Lưu ý: Bạn cần đăng nhập thành công bằng <b>test-login.html</b> trước,
        rồi mới test đăng xuất.
    </p>

    <button id="logoutBtn">Test đăng xuất</button>

    <pre id="result"></pre>

    <script>
        document.getElementById("logoutBtn").addEventListener("click", function () {
            fetch("./api/auth/logout.php", {
                method: "POST"
            })
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                document.getElementById("result").textContent = JSON.stringify(data, null, 4);
            })
            .catch(function (error) {
                document.getElementById("result").textContent = error;
            });
        });
    </script>
</body>
</html>
