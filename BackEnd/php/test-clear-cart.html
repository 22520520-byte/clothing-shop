<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Clear Cart API</title>
</head>
<body>
    <h2>Test Clear Cart API</h2>

    <p>
        Lưu ý: Bạn cần đăng nhập bằng <b>test-login.html</b>,
        sau đó thêm sản phẩm bằng <b>test-add-to-cart.html</b>,
        rồi mới test xóa toàn bộ giỏ hàng.
    </p>

    <button id="clearCartBtn">Xóa toàn bộ giỏ hàng</button>

    <pre id="result"></pre>

    <script>
        document.getElementById("clearCartBtn").addEventListener("click", function () {
            const confirmClear = confirm("Bạn có chắc muốn xóa toàn bộ giỏ hàng không?");

            if (!confirmClear) {
                return;
            }

            fetch("./api/cart/clear-cart.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                credentials: "same-origin"
            })
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                document.getElementById("result").textContent = JSON.stringify(data, null, 4);
            })
            .catch(function (error) {
                document.getElementById("result").textContent = error;
            });
        });
    </script>
</body>
</html>
