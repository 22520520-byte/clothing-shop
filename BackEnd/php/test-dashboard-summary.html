<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Dashboard Summary API</title>
</head>
<body>
    <h2>Test Dashboard Summary API</h2>

    <p>
        Lưu ý: Bạn cần đăng nhập bằng tài khoản <b>owner/admin/staff</b> trước.
        Nếu đang đăng nhập bằng tài khoản khách hàng thì API sẽ báo không có quyền.
    </p>

    <button id="getDashboardBtn">Lấy dữ liệu dashboard</button>

    <pre id="result"></pre>

    <script>
        document.getElementById("getDashboardBtn").addEventListener("click", function () {
            fetch("./api/reports/get-dashboard-summary.php", {
                method: "GET",
                credentials: "same-origin"
            })
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                document.getElementById("result").textContent = JSON.stringify(data, null, 4);
            })
            .catch(function (error) {
                document.getElementById("result").textContent = error;
            });
        });
    </script>
</body>
</html>
