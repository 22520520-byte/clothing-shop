<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Admin Orders API</title>
</head>
<body>
    <h2>Test Admin Orders API</h2>

    <p>
        Lưu ý: Bạn cần đăng nhập bằng tài khoản <b>owner/admin/staff</b> trước.
    </p>

    <div>
        <label>Từ khóa:</label>
        <br>
        <input id="keywordInput" type="text" value="">
    </div>

    <br>

    <div>
        <label>Trạng thái đơn hàng:</label>
        <br>
        <select id="orderStatusInput">
            <option value="all">Tất cả</option>
            <option value="pending">pending - Chờ xác nhận</option>
            <option value="confirmed">confirmed - Đã xác nhận</option>
            <option value="shipping">shipping - Đang giao hàng</option>
            <option value="completed">completed - Hoàn thành</option>
            <option value="cancelled">cancelled - Đã hủy</option>
        </select>
    </div>

    <br>

    <div>
        <label>Trạng thái thanh toán:</label>
        <br>
        <select id="paymentStatusInput">
            <option value="all">Tất cả</option>
            <option value="unpaid">unpaid</option>
            <option value="paid">paid</option>
            <option value="failed">failed</option>
            <option value="refunded">refunded</option>
        </select>
    </div>

    <br>

    <div>
        <label>Phương thức thanh toán:</label>
        <br>
        <select id="paymentMethodInput">
            <option value="all">Tất cả</option>
            <option value="cod">COD</option>
            <option value="bank_transfer">Bank transfer</option>
            <option value="momo">MoMo</option>
            <option value="vnpay">VNPay</option>
        </select>
    </div>

    <br>

    <div>
        <label>Từ ngày:</label>
        <br>
        <input id="fromDateInput" type="date">
    </div>

    <br>

    <div>
        <label>Đến ngày:</label>
        <br>
        <input id="toDateInput" type="date">
    </div>

    <br>

    <div>
        <label>Sắp xếp:</label>
        <br>
        <select id="sortInput">
            <option value="latest">Mới nhất</option>
            <option value="oldest">Cũ nhất</option>
            <option value="total_desc">Tổng tiền cao nhất</option>
            <option value="total_asc">Tổng tiền thấp nhất</option>
        </select>
    </div>

    <br>

    <button id="getOrdersBtn">Lấy danh sách đơn hàng admin</button>

    <pre id="result"></pre>

    <script>
        document.getElementById("getOrdersBtn").addEventListener("click", function () {
            const keyword = document.getElementById("keywordInput").value.trim();
            const orderStatus = document.getElementById("orderStatusInput").value;
            const paymentStatus = document.getElementById("paymentStatusInput").value;
            const paymentMethod = document.getElementById("paymentMethodInput").value;
            const fromDate = document.getElementById("fromDateInput").value;
            const toDate = document.getElementById("toDateInput").value;
            const sort = document.getElementById("sortInput").value;

            let url = "./api/admin/orders/get-orders.php?page=1&limit=10";
            url += "&keyword=" + encodeURIComponent(keyword);
            url += "&order_status=" + encodeURIComponent(orderStatus);
            url += "&payment_status=" + encodeURIComponent(paymentStatus);
            url += "&payment_method=" + encodeURIComponent(paymentMethod);
            url += "&from_date=" + encodeURIComponent(fromDate);
            url += "&to_date=" + encodeURIComponent(toDate);
            url += "&sort=" + encodeURIComponent(sort);

            fetch(url, {
                method: "GET",
                credentials: "same-origin"
            })
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                document.getElementById("result").textContent = JSON.stringify(data, null, 4);
            })
            .catch(function (error) {
                document.getElementById("result").textContent = error;
            });
        });
    </script>
</body>
</html>
