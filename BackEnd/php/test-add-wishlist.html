<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Add Wishlist API</title>
</head>
<body>
    <h2>Test Add Wishlist API</h2>

    <p>
        Lưu ý: Bạn cần đăng nhập bằng <b>test-login.html</b> trước.
    </p>

    <div>
        <label>Product ID:</label>
        <br>
        <input id="productIdInput" type="number" value="1" min="1">
    </div>

    <br>

    <div>
        <label>Product slug:</label>
        <br>
        <input id="productSlugInput" type="text" value="">
    </div>

    <br>

    <button id="addWishlistBtn">Thêm vào yêu thích</button>

    <pre id="result"></pre>

    <script>
        document.getElementById("addWishlistBtn").addEventListener("click", function () {
            const productId = Number(document.getElementById("productIdInput").value);
            const productSlug = document.getElementById("productSlugInput").value.trim();

            fetch("./api/customer-features/add-wishlist.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                credentials: "same-origin",
                body: JSON.stringify({
                    product_id: productId,
                    product_slug: productSlug
                })
            })
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                document.getElementById("result").textContent = JSON.stringify(data, null, 4);
            })
            .catch(function (error) {
                document.getElementById("result").textContent = error;
            });
        });
    </script>
</body>
</html>
